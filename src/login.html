<!DOCTYPE html>
<html>
<head>
    <title>Sistema de Autenticación</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 100px;
        }
        input {
            margin: 5px;
            padding: 8px;
        }
        button {
            padding: 8px 15px;
        }
    </style>
</head>
<body>

    <h2>Inicio de sesión de usuarios</h2>

    <input type="text" id="usuario" placeholder="Ingrese su usuario"><br>
    <input type="password" id="password" placeholder="Ingrese su contraseña"><br>
    <button onclick="login()">Ingresar</button>

    <p id="mensaje"></p>

    <script>
        function login() {
            let user = document.getElementById("usuario").value;
            let pass = document.getElementById("password").value;

            if(user === "" || pass === ""){
                document.getElementById("mensaje").innerText = "Por favor, complete todos los campos.";
            } else if(user === "admin" && pass === "1234"){
                document.getElementById("mensaje").innerText = "Inicio de sesión exitoso. Bienvenido.";
            } else {
                document.getElementById("mensaje").innerText = "Usuario o contraseña incorrectos.";
            }
        }
    </script>

</body>
</html>
