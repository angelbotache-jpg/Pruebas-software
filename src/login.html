<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Autenticación</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
            text-align: center;
            width: 300px;
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #4facfe;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background-color: #3a8dde;
        }

        #mensaje {
            margin-top: 15px;
            font-weight: bold;
        }

        .error {
            color: red;
        }

        .success {
            color: green;
        }
    </style>
</head>

<body>

    <div class="login-container">
        <h2>Inicio de sesión</h2>

        <input type="text" id="usuario" placeholder="Usuario">
        <input type="password" id="password" placeholder="Contraseña">

        <button onclick="login()">Ingresar</button>

        <p id="mensaje"></p>
    </div>

    <script>
        function validarCredenciales(usuario, password){
    if(usuario === "" || password === ""){
        return "VACIO";
    } else if(usuario === "admin" && password === "1234"){
        return "OK";
    } else {
        return "ERROR";
    }
}
 console.log("Prueba 1:", validarCredenciales("admin", "1234") === "OK" ? "Aprobado" : "Fallo");
    console.log("Prueba 2:", validarCredenciales("admin", "0000") === "ERROR" ? "Aprobado" : "Fallo");
    console.log("Prueba 3:", validarCredenciales("", "") === "VACIO" ? "Aprobado" : "Fallo");

        function login() {
    let user = document.getElementById("usuario").value;
    let pass = document.getElementById("password").value;
    let mensaje = document.getElementById("mensaje");

    let resultado = validarCredenciales(user, pass);

    if(resultado === "VACIO"){
        mensaje.innerText = "Por favor, complete todos los campos.";
        mensaje.className = "error";
    } else if(resultado === "OK"){
        mensaje.innerText = "Inicio de sesión exitoso. Bienvenido.";
        mensaje.className = "success";
    } else {
        mensaje.innerText = "Usuario o contraseña incorrectos.";
        mensaje.className = "error";
    }
}

    </script>

</body>
</html>
